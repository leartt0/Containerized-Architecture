apiVersion: v1
kind: Secret
metadata:
  name: adria-secrets
  namespace: adria-production
type: Opaque
stringData:
  DB_PASSWORD: adria_prod_k8s_password_rotate
  JWT_SECRET: production-jwt-secret-use-sealed-secrets
  JWT_REFRESH_SECRET: production-refresh-secret-use-sealed-secrets
  BROS_TRAVEL_USERNAME: demo
  BROS_TRAVEL_PASSWORD: demo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adria-backend-config
  namespace: adria-production
data:
  NODE_ENV: production
  PORT: "3001"
  LOG_LEVEL: warn
  DB_HOST: adria-postgres
  DB_PORT: "5432"
  DB_NAME: adria_reserve
  DB_USER: adria_user
  FRONTEND_URL: http://adria-frontend
  BROS_TRAVEL_API_URL: https://services.bros-travel.com

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adria-postgres-config
  namespace: adria-production
data:
  POSTGRES_DB: adria_reserve
  POSTGRES_USER: adria_user

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adria-backend-logs-pvc
  namespace: adria-production
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# Production: no ResourceQuota — unlimited resources per assignment requirements

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: adria-postgres
  namespace: adria-production
spec:
  serviceName: adria-postgres
  replicas: 1
  selector:
    matchLabels:
      app: adria-postgres
  template:
    metadata:
      labels:
        app: adria-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: adria-postgres-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adria-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "adria_user", "-d", "adria_reserve"]
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: adria-postgres
  namespace: adria-production
spec:
  clusterIP: None
  selector:
    app: adria-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adria-backend
  namespace: adria-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: adria-backend
  template:
    metadata:
      labels:
        app: adria-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z adria-postgres 5432; do sleep 2; done"]
      containers:
        - name: backend
          image: leartt0/adria-reserve-backend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: adria-backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adria-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: adria-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: adria-secrets
                  key: JWT_REFRESH_SECRET
            - name: BROS_TRAVEL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: adria-secrets
                  key: BROS_TRAVEL_USERNAME
            - name: BROS_TRAVEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adria-secrets
                  key: BROS_TRAVEL_PASSWORD
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: adria-backend-logs-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: adria-backend
  namespace: adria-production
spec:
  type: ClusterIP
  selector:
    app: adria-backend
  ports:
    - port: 3001
      targetPort: 3001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adria-frontend
  namespace: adria-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: adria-frontend
  template:
    metadata:
      labels:
        app: adria-frontend
    spec:
      containers:
        - name: frontend
          image: leartt0/adria-reserve-frontend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: adria-frontend
  namespace: adria-production
spec:
  type: NodePort
  selector:
    app: adria-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30082
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: adria-backend-hpa
  namespace: adria-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adria-backend
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: adria-frontend-hpa
  namespace: adria-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adria-frontend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: adria-backend-vpa
  namespace: adria-production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adria-backend
  updatePolicy:
    updateMode: "Off"

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: adria-frontend-vpa
  namespace: adria-production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adria-frontend
  updatePolicy:
    updateMode: "Off"
